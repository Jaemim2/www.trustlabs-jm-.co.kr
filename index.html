<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="TRUSTORY LABS — Anti-fraud communication · Financial literacy · TrustTech media. Safer Money, Smarter Decisions."/>
<title>TRUSTORY LABS — Safer Money, Smarter Decisions</title>
<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DESIGN TOKENS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root{
  --f:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic","Segoe UI","Helvetica Neue",Arial,sans-serif;
  --blue:#3182f6;--blue-d:#1b64da;--blue-l:#ebf3ff;--blue-ll:#f4f9ff;
  --ink:#191f28;--ink2:#3c4453;--muted:#6b7684;--muted2:#9aa3b0;
  --line:#e6edf5;--line2:#f0f5fb;--bg:#f6f9fc;--bg2:#f0f4f9;--white:#fff;
  --green:#00b96b;--amber:#f59e0b;--red:#f04452;
  --r:14px;--r-lg:20px;--r-xl:28px;--r-2xl:36px;
  --sh:0 2px 12px rgba(0,0,0,.06);--sh-md:0 8px 28px rgba(0,0,0,.09);--sh-lg:0 16px 56px rgba(0,0,0,.13);
  --nh:66px;--max:1120px;
}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--f);color:var(--ink);background:#fff;line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:var(--f);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--f)}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   LAYOUT UTILS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.W{width:min(var(--max),calc(100% - 48px));margin:0 auto}
.Ws{width:min(780px,calc(100% - 48px));margin:0 auto}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.page{display:none}.page.on{display:block;animation:pgIn .32s cubic-bezier(.22,.68,0,1.1) both}
@keyframes pgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   NAV
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#nav{position:fixed;top:0;left:0;right:0;z-index:900;height:var(--nh);
  background:rgba(255,255,255,.95);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-bottom:1px solid var(--line)}
.nrow{display:flex;align-items:center;justify-content:space-between;height:100%;gap:12px}
.brand{display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0}
.bmark{width:36px;height:36px;border-radius:11px;background:linear-gradient(135deg,#111827,var(--blue));
  display:grid;place-items:center;box-shadow:0 4px 14px rgba(49,130,246,.32);flex-shrink:0}
.bmark svg{width:22px;height:22px}
.bnm{font-size:15px;font-weight:800;letter-spacing:-.035em;color:var(--ink)}
.bsb{font-size:9.5px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);display:block;margin-top:1px}
.nlk{display:flex;gap:2px}
.nlk button{font-size:13px;font-weight:500;color:var(--muted);padding:7px 13px;border-radius:10px;transition:.15s}
.nlk button:hover{background:var(--bg);color:var(--ink)}
.nlk button.on{color:var(--blue);background:var(--blue-l);font-weight:600}
.nend{display:flex;align-items:center;gap:8px;flex-shrink:0}
.lsw{display:flex;background:var(--bg);border:1px solid var(--line);border-radius:100px;padding:3px}
.lsw button{font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:100px;color:var(--muted);transition:.15s}
.lsw button.on{background:var(--ink);color:#fff}
.ncta{background:var(--blue);color:#fff;padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;
  transition:.15s;box-shadow:0 3px 12px rgba(49,130,246,.32);white-space:nowrap}
.ncta:hover{background:var(--blue-d);transform:translateY(-1px)}
/* Subnav */
#sn{position:fixed;top:var(--nh);left:0;right:0;z-index:899;height:40px;
  background:rgba(246,249,252,.96);border-bottom:1px solid var(--line);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:none}
#sn.show{display:flex;align-items:center}
.snw{display:flex;align-items:center;gap:1px;height:100%;
  width:min(var(--max),calc(100% - 48px));margin:0 auto;overflow-x:auto;scrollbar-width:none}
.snw::-webkit-scrollbar{display:none}
.snb{font-size:12.5px;font-weight:500;color:var(--muted);padding:5px 13px;border-radius:8px;white-space:nowrap;transition:.15s}
.snb:hover{color:var(--ink);background:rgba(0,0,0,.05)}
.snb.on{color:var(--blue);font-weight:700}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SHARED TYPOGRAPHY
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.ey{font-size:11px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;
  color:var(--blue);display:block;margin-bottom:12px}
.eyW{color:rgba(130,189,255,.75)}
.hd1{font-size:clamp(28px,3.6vw,44px);font-weight:800;letter-spacing:-.04em;line-height:1.1}
.hd2{font-size:clamp(24px,3vw,36px);font-weight:800;letter-spacing:-.035em;line-height:1.12}
.hd3{font-size:clamp(18px,2.2vw,24px);font-weight:700;letter-spacing:-.025em}
.sub{font-size:16px;color:var(--muted);line-height:1.85;max-width:580px}
.subW{color:rgba(255,255,255,.5)}
.hd{margin-bottom:48px}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BUTTONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.bp{display:inline-flex;align-items:center;gap:7px;background:var(--blue);color:#fff;
  padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;transition:.16s;
  box-shadow:0 4px 14px rgba(49,130,246,.32);letter-spacing:-.01em}
.bp:hover{background:var(--blue-d);transform:translateY(-1px)}
.bs{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.08);color:#fff;
  padding:12px 22px;border-radius:12px;font-size:14px;font-weight:600;
  border:1.5px solid rgba(255,255,255,.2);transition:.16s}
.bs:hover{background:rgba(255,255,255,.14)}
.bd{display:inline-flex;align-items:center;gap:7px;background:var(--ink);color:#fff;
  padding:12px 22px;border-radius:12px;font-size:14px;font-weight:700;transition:.16s}
.bd:hover{background:var(--blue)}
.bo{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--blue);color:var(--blue);
  padding:11px 20px;border-radius:12px;font-size:14px;font-weight:700;transition:.16s}
.bo:hover{background:var(--blue-l)}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   TAGS / PILLS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.tg{display:inline-block;font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:100px}
.tb{background:var(--blue-l);color:var(--blue-d)}
.tg2{background:#e6faf0;color:#006a3e}
.ta{background:#fff8e7;color:#915500}
.td{background:var(--bg);color:var(--ink2);border:1px solid var(--line)}
.tw{background:rgba(255,255,255,.12);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.22)}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CARDS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.card{background:#fff;border:1px solid var(--line);border-radius:var(--r-xl);
  padding:28px;box-shadow:var(--sh);transition:.2s}
.card:hover{box-shadow:var(--sh-md);transform:translateY(-2px)}
.cdk{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--r-xl);padding:28px;transition:.2s}
.cdk:hover{background:rgba(255,255,255,.1)}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SECTIONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.sec{padding:80px 0}.secSm{padding:56px 0}
.secD{background:#0c1321;padding:80px 0}
.secB{background:var(--bg);padding:80px 0}
.dvd{border:none;border-top:1px solid var(--line)}
.dvdD{border:none;border-top:1px solid rgba(255,255,255,.08)}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HOME HERO
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hhero{background:linear-gradient(160deg,#0c1321 0%,#101b35 100%);
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;
  position:relative;overflow:hidden}
.hhero::before{content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 60% at 70% 30%,rgba(49,130,246,.18),transparent 60%),
    radial-gradient(ellipse 40% 50% at 8% 70%,rgba(49,130,246,.07),transparent 50%)}
.hhi{position:relative;z-index:1;padding:calc(var(--nh) + 56px) 0 64px}
.hgrid{display:grid;grid-template-columns:1.1fr .9fr;gap:52px;align-items:center}
/* hero left */
.hbadge{display:inline-flex;align-items:center;gap:8px;
  background:rgba(49,130,246,.16);border:1px solid rgba(49,130,246,.3);
  border-radius:100px;padding:6px 14px;margin-bottom:20px}
.hbd{width:6px;height:6px;border-radius:50%;background:#7db8ff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hbadge span{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#93c5fd}
.htitle{font-size:clamp(26px,3.4vw,40px);font-weight:800;letter-spacing:-.04em;
  line-height:1.13;color:#fff;margin-bottom:18px;white-space:pre-line}
.htitle em{color:#7db8ff;font-style:normal}
.hsub{font-size:16px;color:rgba(255,255,255,.5);line-height:1.85;margin-bottom:30px;max-width:460px;white-space:pre-line}
.hacts{display:flex;flex-wrap:wrap;gap:10px}
/* hero right */
.hrc{display:flex;flex-direction:column;gap:11px}
.hvc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  border-radius:22px;padding:20px 24px}
.hvcv{font-size:30px;font-weight:800;letter-spacing:-.04em;color:#fff;line-height:1;margin-bottom:5px}
.hvcv em{font-size:16px;color:#7db8ff;font-style:normal}
.hvcl{font-size:12px;color:rgba(255,255,255,.4);line-height:1.55;white-space:pre-line}
.halert{background:rgba(240,68,82,.1);border:1px solid rgba(240,68,82,.22);
  border-radius:16px;padding:15px;display:flex;gap:11px}
.hai{width:24px;height:24px;border-radius:7px;background:rgba(240,68,82,.7);
  display:grid;place-items:center;font-size:11px;color:#fff;font-weight:800;flex-shrink:0;margin-top:1px}
.halt strong{display:block;font-size:12px;font-weight:700;color:#fca5a5;margin-bottom:2px}
.halt p{font-size:11.5px;color:rgba(252,165,165,.65);line-height:1.55}
/* stats strip */
.hstrip{background:rgba(255,255,255,.04);border-top:1px solid rgba(255,255,255,.07)}
.hsgrid{display:grid;grid-template-columns:repeat(3,1fr)}
.hsitem{padding:24px 28px;border-right:1px solid rgba(255,255,255,.06)}
.hsitem:last-child{border:none}
.hsv{font-size:30px;font-weight:800;letter-spacing:-.04em;color:#fff;line-height:1;margin-bottom:5px}
.hsv em{color:#7db8ff;font-style:normal;font-size:17px}
.hsl{font-size:12px;color:rgba(255,255,255,.38);line-height:1.5}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   PRODUCT TEASERS (home)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.prow{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:44px}
.pc{background:#fff;border:1px solid var(--line);border-radius:var(--r-xl);
  padding:28px;box-shadow:var(--sh);cursor:pointer;transition:.2s;position:relative;overflow:hidden}
.pc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.pc:nth-child(1)::before{background:linear-gradient(90deg,#3182f6,#7db8ff)}
.pc:nth-child(2)::before{background:linear-gradient(90deg,#00b96b,#6ee7b7)}
.pc:nth-child(3)::before{background:linear-gradient(90deg,#7c3aed,#c4b5fd)}
.pc:hover{transform:translateY(-4px);box-shadow:var(--sh-md)}
.pcico{font-size:32px;margin-bottom:14px}
.pcnm{font-size:17px;font-weight:800;letter-spacing:-.025em;color:var(--ink);margin-bottom:4px}
.pcsb{font-size:12px;font-weight:600;margin-bottom:10px}
.pcd{font-size:13.5px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.pclk{font-size:13px;font-weight:700;color:var(--blue);display:flex;align-items:center;gap:5px}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   DATA VIZ BARS (mission)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.dbr{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.dbr:last-child{border:none}
.dbl{font-size:13px;color:rgba(255,255,255,.6);width:210px;flex-shrink:0;line-height:1.4}
.dbt{flex:1;height:7px;background:rgba(255,255,255,.07);border-radius:100px;overflow:hidden}
.dbf{height:100%;border-radius:100px;transition:width .8s ease}
.dbv{font-size:13px;font-weight:800;width:80px;text-align:right;flex-shrink:0}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CURRICULUM (academy)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.clevel{margin-bottom:28px}
.clhd{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.clbdg{background:var(--blue);color:#fff;font-size:10.5px;font-weight:800;
  padding:4px 12px;border-radius:100px;letter-spacing:.06em}
.clnm{font-size:15px;font-weight:700;color:var(--ink)}
.clmods{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.clmod{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px 16px;transition:.15s}
.clmod:hover{border-color:#a5c8ff;box-shadow:var(--sh)}
.clmn{font-size:10px;font-weight:800;color:var(--blue);letter-spacing:.08em;margin-bottom:4px}
.clmt{font-size:13px;font-weight:600;color:var(--ink);line-height:1.45}
.clmd{font-size:11.5px;color:var(--muted);margin-top:4px}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   STUDIO PACKAGES
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.pkgr{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.pkgc{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);padding:24px;box-shadow:var(--sh)}
.pkgico{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;font-size:20px;margin-bottom:13px}
.pkgc h4{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:10px}
.pkgl{list-style:none;display:grid;gap:6px}
.pkgl li{font-size:13px;color:var(--muted);display:flex;gap:7px}
.pkgl li::before{content:'·';color:var(--blue);font-weight:800;flex-shrink:0}
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HIRING PROCESS (horizontal stepper)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.stepper{display:flex;align-items:flex-start;position:relative;margin-top:44px}
.step-line{position:absolute;top:21px;left:7%;right:7%;height:2px;
  background:linear-gradient(90deg,var(--blue),#7db8ff);z-index:0;border-radius:1px}

/* ═══════════════════════════════════════════════════════════
   ROUTING
═══════════════════════════════════════════════════════════ */
const CAREER_ROUTES=['careers','culture','benefits','process','jobs'];
function go(r){location.hash=r}
function isCareer(r){const base=r.split('/')[0];return CAREER_ROUTES.includes(base)||base==='job'||base==='apply'}
function d(){return L==='en'?EN:KO}

window.addEventListener('hashchange',handleRoute);
window.addEventListener('load',handleRoute);

function handleRoute(){
  const raw=(location.hash||'#home').slice(1)||'home';
  const parts=raw.split('/');
  const route=parts[0],sub=parts[1]||null;
  const html=renderPage(route,sub);
  const app=document.getElementById('app');
  app.innerHTML='<div class="page on">'+html+'</div>';
  window.scrollTo({top:0,behavior:'instant'});
  updateChrome(route);
  bindUI(route);
}
function updateChrome(route){
  document.getElementById('n-sub').textContent=d().navSub;
  document.getElementById('n-cta').textContent=d().navCta;
  document.getElementById('l-ko').className=L==='ko'?'on':'';
  document.getElementById('l-en').className=L==='en'?'on':'';
  document.getElementById('n-lk').innerHTML=d().nl.map(n=>`<button class="${route===n.r?'on':''}" onclick="go('${n.r}')">${n.l}</button>`).join('');
  const sn=document.getElementById('sn');
  sn.className=isCareer(route)?'show':'';
  document.getElementById('sn-w').innerHTML=d().cs.map(n=>`<button class="snb${route===n.r?'on':''}" onclick="go('${n.r}')">${n.l}</button>`).join('');
  renderFooter();
}
function bindUI(route){
  document.querySelectorAll('.fqq').forEach(btn=>{
    btn.onclick=function(){
      const item=this.parentElement;
      const was=item.classList.contains('on');
      document.querySelectorAll('.fqi').forEach(f=>f.classList.remove('on'));
      if(!was)item.classList.add('on');
    };
  });
  if(route==='jobs')bindFilter();
}
function setLang(l){
  L=l;
  document.getElementById('l-ko').className=l==='ko'?'on':'';
  document.getElementById('l-en').className=l==='en'?'on':'';
  const raw=(location.hash||'#home').slice(1)||'home';
  const parts=raw.split('/');
  const route=parts[0],sub=parts[1]||null;
  const html=renderPage(route,sub);
  document.getElementById('app').innerHTML='<div class="page on">'+html+'</div>';
  window.scrollTo({top:0,behavior:'instant'});
  updateChrome(route);
  bindUI(route);
}

function faqHTML(arr,dark=false){
  return arr.map((f,i)=>`<div class="fqi${dark?' dk':''}"><button class="fqq">${f[0]}<span class="fqico">+</span></button><div class="fqa"><p>${f[1]}</p></div></div>`).join('');
}
function tagsHTML(tags,cls='tb'){
  const cc=['tb','tg2','ta','td','tw'];
  return tags.map((t,i)=>`<span class="tg ${cc[i%cc.length]}">${t}</span>`).join('');
}

/* ═══════════════════════════════════════════════════════════
   PAGE RENDERS
═══════════════════════════════════════════════════════════ */
function renderPage(route,sub){
  switch(route){
    case 'about': return pgAbout();
    case 'mission': return pgMission();
    case 'services': return pgServices();
    case 'service': return pgServiceSub(sub);
    case 'clients': return pgClients();
    case 'careers': return pgCareers();
    case 'culture': return pgCulture();
    case 'benefits': return pgBenefits();
    case 'process': return pgProcess();
    case 'jobs': return pgJobs();
    case 'job': return pgJobDetail(sub);
    case 'apply': return pgApply(sub);
    case 'contact': return pgContact();
    default: return pgHome();
  }
}

function jobCard(jb){
  return `<div class="jcard" data-dept="${jb.dept}" data-type="${jb.type}" data-exp="${jb.exp}" onclick="go('job/${jb.id}')">
    <div>
      <div class="jcdept">${jb.dept}</div>
      <div class="jctitle">${jb.title}</div>
      <div class="jctags">${tagsHTML(jb.tags)}</div>
      <div class="jcdesc">${jb.desc}</div>
    </div>
    <div class="jcarr">→</div>
  </div>`;
}
function bindFilter(){
  document.querySelectorAll('input[name="jdept"],input[name="jtype"]').forEach(inp=>inp.addEventListener('change',filterJobs));
}
function filterJobs(){
  const dept=document.querySelector('input[name="jdept"]:checked')?.value||d().jobs.depts[0];
  const type=document.querySelector('input[name="jtype"]:checked')?.value||d().jobs.types[0];
  const j=d().jobs;
  let count=0;
  document.querySelectorAll('.jcard').forEach(c=>{
    const dm=dept===j.depts[0]||c.dataset.dept===dept;
    const tm=type===j.types[0]||c.dataset.type===type;
    c.style.display=(dm&&tm)?'':'none';
    if(dm&&tm)count++;
  });
  const nr=document.getElementById('nores');
  if(nr)nr.style.display=count===0?'block':'none';
  const cnt=document.getElementById('jcnt');
  if(cnt)cnt.innerHTML=`<strong>${count}</strong>${L==='en'?' positions':'개 포지션'}`;
}
function resetFilter(){
  document.querySelectorAll('input[name="jdept"]').forEach((r,i)=>{r.checked=i===0});
  document.querySelectorAll('input[name="jtype"]').forEach((r,i)=>{r.checked=i===0});
  filterJobs();
}

        <div class="afsec">

function submitApply(){
  const priv=document.getElementById('chkPrivacy');
  const doc=document.getElementById('chkDoc');
  if(!priv?.checked||!doc?.checked){
    alert(L==='en'?'Please check all required consent boxes.':'필수 동의 항목을 체크해주세요.');return;
  }
  const btn=document.getElementById('apSubmit');
  if(btn){btn.textContent=d().submitSent;btn.classList.add('sent');btn.disabled=true;}
}

═══════════════════════════════════════════════════════════ */
function filterCli(type){
  document.querySelectorAll('.ctab').forEach(t=>t.classList.toggle('on',t.dataset.type===type));
  document.querySelectorAll('.clc').forEach(c=>{c.style.display=(type==='all'||c.dataset.type===type)?'':'none'});
}
